<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>晨夕四诊 - 登录</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: "Microsoft YaHei", "PingFang SC", "Hiragino Sans GB", sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #f4f9ff 0%, #dbe9ff 45%, #c9ddff 100%);
        }
        .login-box {
            width: 420px;
            max-width: 90vw;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 22px;
            box-shadow: 0 24px 60px rgba(18, 74, 160, 0.2);
            padding: 40px;
            border: 1px solid rgba(120, 170, 255, 0.35);
        }
        .title {
            text-align: center;
            margin-bottom: 30px;
        }
        .title h1 {
            font-size: 2.5rem;
            color: #104299;
            letter-spacing: 6px;
            margin-bottom: 10px;
        }
        .title p {
            color: #2a5daa;
            font-size: 1rem;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #1a4f9f;
            font-weight: 600;
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #c7dcff;
            border-radius: 12px;
            font-size: 1rem;
            background: #f8fbff;
        }
        .form-group input:focus {
            outline: none;
            border-color: #1f5fca;
            box-shadow: 0 0 0 3px rgba(31, 95, 202, 0.1);
        }
        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(120deg, #1f5fca 0%, #3f8cff 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
        }
        .btn-login:hover {
            background: linear-gradient(120deg, #1648a8 0%, #2e7aff 100%);
        }
        .info {
            text-align: center;
            margin-top: 20px;
            color: #666;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="title">
            <h1>晨夕四诊</h1>
            <p>传承中医智慧 · AI 赋能现代诊疗</p>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label>账号</label>
                <input type="text" id="username" value="admin" placeholder="请输入账号">
            </div>

            <div class="form-group">
                <label>密码</label>
                <input type="password" id="password" value="admin123" placeholder="请输入密码">
            </div>

            <button type="submit" class="btn-login">登录</button>
        </form>

        <div class="info">
            <p>中医与智能融合，服务教学与临床</p>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            if (username === 'admin' && password === 'admin123') {
                alert('登录成功！');
            } else {
                alert('用户名或密码错误');
            }
        });
    </script>
</body>
</html>
