<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Minimal Vue Test</title>
</head>
<body>
    <div id="app"></div>

    <script type="module">
        import {
            createApp,
            ref
        } from 'https://unpkg.com/vue@3.4.0/dist/vue.esm-browser.js'

        createApp({
            setup() {
                const title = ref('最简单的 Vue 3 测试')
                const count = ref(0)

                return {
                    title,
                    count
                }
            },
            template: `
                <div style="padding: 30px; font-family: Arial, sans-serif; text-align: center;">
                    <h1 style="color: #1f5fca;">{{ title }}</h1>
                    <p>计数: {{ count }}</p>
                    <button @click="count++" style="padding: 10px 20px; font-size: 16px; cursor: pointer; background: #1f5fca; color: white; border: none; border-radius: 5px;">
                        点我
                    </button>
                </div>
            `
        }).mount('#app')
    </script>
</body>
</html>
